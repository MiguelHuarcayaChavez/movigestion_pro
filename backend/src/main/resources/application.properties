spring.application.name=movigestion

# Spring DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/movigestion?useSSL=true&serverTimezone=UTC&createDatabaseIfNotExist=true&publicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring Data JPA Configuration
spring.jpa.show-sql=true

#Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Application Information for Documentation

# Elements take their values from maven pom.xml build-related information


# JWT Configuration Properties
jwt.secret=WriteHereYourSecretStringForTokenSigningCredentials
jwt.expiration.minutes=120